<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voy! - Repartidores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes aparecerVentana {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animar-ventana { animation: aparecerVentana 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- PANTALLA 1: LOGIN DEL REPARTIDOR -->
    <div id="pantalla-login" class="w-full max-w-sm bg-white p-6 rounded-2xl shadow-xl text-center space-y-5 animar-ventana block">
        <div class="text-center">
            <span class="text-4xl">🏍️</span>
            <h1 class="text-2xl font-black text-slate-900 mt-2">Voy! Repartidores</h1>
            <p class="text-xs text-slate-500 mt-1">Ingresá tus credenciales desde la base de datos</p>
        </div>
        
        <form id="form-login" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Número de DNI</label>
                <input type="number" id="login-dni" required placeholder="Ej: 29474060" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-800">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Contraseña</label>
                <input type="password" id="login-clave" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-800">
            </div>
            <div id="error-login" class="text-xs text-red-600 font-bold hidden text-center bg-red-50 p-2 rounded-lg">
                ⚠️ DNI o Clave incorrectos o usuario no autorizado.
            </div>
            <button type="submit" id="btn-ingresar" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md text-sm">
                Ingresar a la Plataforma
            </button>
        </form>
    </div>

    <!-- PANTALLA 2: PANEL DE TRABAJO -->
    <div id="pantalla-panel" class="w-full max-w-sm space-y-6 hidden">
        
        <!-- ENCABEZADO -->
        <div class="w-full flex items-center justify-between border-b border-gray-200 pb-4">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏍️</span>
                <div class="text-left">
                    <h1 id="nombre-chofer" class="text-slate-900 font-black text-xl tracking-tight">Cargando...</h1>
                    <p class="text-emerald-600 text-xs font-bold flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span> En Línea
                    </p>
                </div>
            </div>
            <button id="btn-cerrar-session" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold px-3 py-1.5 rounded-lg transition">Salir</button>
        </div>
        
        <!-- PANELES DE ÓRDENES VIAJES -->
        <div class="bg-slate-900 p-5 rounded-2xl text-left text-white shadow-xl">
            <h2 class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3">📌 Mi Orden Asignada</h2>
            <div id="viaje-activo-contenedor">
                <p class="text-xs text-slate-400 italic text-center py-2">No tienes viajes asignados actualmente.</p>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-xl text-left">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">📥 Viajes Disponibles</h2>
            <div id="lista-disponibles" class="space-y-3">
                <p class="text-xs text-gray-400 italic text-center py-4">Buscando nuevos pedidos entrantes...</p>
            </div>
        </div>
    </div>

    <!-- SCRIPT EN TIEMPO REAL CON CONSULTA DINÁMICA A LA NUBE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjHsaiCJRWkbdswZzNk6IcqxlkXx20n9o",
            authDomain: "voy-259ba.firebaseapp.com",
            projectId: "voy-259ba",
            storageBucket: "voy-259ba.firebasestorage.app",
            messagingSenderId: "135425806109",
            appId: "1:135425806109:web:09cd26519b0b256b5c1bf4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let choferLogueado = null;
        let geoWatchId = null;

        const pLogin = document.getElementById("pantalla-login");
        const pPanel = document.getElementById("pantalla-panel");
        const errorLogin = document.getElementById("error-login");
        const btnIngresar = document.getElementById("btn-ingresar");

        // LOGIN VALIDADOR EN TIEMPO REAL DESDE FIRESTORE
        document.getElementById("form-login").addEventListener("submit", async (e) => {
            e.preventDefault();
            const dniIngresado = document.getElementById("login-dni").value.trim();
            const claveIngresada = document.getElementById("login-clave").value;

            errorLogin.classList.add("hidden");
            btnIngresar.disabled = true;
            btnIngresar.innerText = "Autenticando en la nube...";

            try {
                const docRef = doc(db, "repartidores", dniIngresado);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const datosRepartidor = docSnap.data();
                    
                    if (datosRepartidor.clave === claveIngresada) {
                        choferLogueado = {
                            dni: dniIngresado,
                            nombre: datosRepartidor.nombre
                        };
                        
                        pLogin.classList.add("hidden");
                        pPanel.classList.remove("hidden");
                        document.body.className = "bg-slate-50 font-sans min-h-screen flex flex-col items-center justify-start p-4 pt-8";
                        
                        document.getElementById("nombre-chofer").innerText = `Hola, ${choferLogueado.nombre}`;
                        
                        inicializarFlujoLogi();
                    } else {
                        errorLogin.classList.remove("hidden");
                    }
                } else {
                    errorLogin.classList.remove("hidden");
                }
            } catch (error) {
                console.error("Error en login: ", error);
                alert("Ocurrió un problema de conexión con Firebase.");
            } finally {
                btnIngresar.disabled = false;
                btnIngresar.innerText = "Ingresar a la Plataforma";
            }
        });

        // CERRAR SESIÓN
        document.getElementById("btn-cerrar-session").addEventListener("click", () => {
            detenerTransmisionGPS();
            choferLogueado = null;
            pPanel.classList.add("hidden");
            pLogin.classList.remove("hidden");
            document.body.className = "bg-slate-50 font-sans min-h-screen flex flex-col items-center justify-center p-4";
            document.getElementById("form-login").reset();
        });

        // FLOW LOGÍSTICO CENTRAL
        function inicializarFlujoLogi() {
            const listaDisponiblesUI = document.getElementById("lista-disponibles");
            const contenedorActivoUI = document.getElementById("viaje-activo-contenedor");

            // 1. Escuchar dinámicamente pedidos en busca de conductor
            const qDisponibles = query(collection(db, "pedidos"), where("estado", "==", "buscando_cadete"));
            onSnapshot(qDisponibles, (snapshot) => {
                listaDisponiblesUI.innerHTML = "";
                if (snapshot.empty) {
                    listaDisponiblesUI.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-4">No hay pedidos por el momento.</p>`;
                    return;
                }
                snapshot.forEach((docSnap) => {
                    const viaje = docSnap.data();
                    const div = document.createElement("div");
                    div.className = "bg-gray-50 border border-gray-200 p-4 rounded-xl space-y-3";
                    div.innerHTML = `
                        <div class="text-xs text-gray-600 space-y-1">
                            <p><strong>📦 Llevar:</strong> ${viaje.detalles}</p>
                            <p><strong>🟢 Desde:</strong> ${viaje.origen}</p>
                            <p><strong>🔴 Hasta:</strong> ${viaje.destino}</p>
                            <p class="text-sm font-bold text-indigo-600 mt-1">Pago: ${viaje.precioEstimado}</p>
                        </div>
                        <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 rounded-lg transition btn-aceptar">Aceptar Viaje</button>
                    `;
                    
                    div.querySelector(".btn-aceptar").addEventListener("click", async (e) => {
                        const boton = e.target;
                        boton.disabled = true;
                        boton.innerText = "Verificando...";

                        const pedidoRef = doc(db, "pedidos", viaje.id);

                        try {
                            await runTransaction(db, async (transaction) => {
                                const sfDoc = await transaction.get(pedidoRef);
                                if (!sfDoc.exists()) throw "El pedido ya no existe.";

                                const estadoActual = sfDoc.data().estado;
                                
                                if (estadoActual === "buscando_cadete") {
                                    transaction.update(pedidoRef, { 
                                        estado: "en_camino",
                                        repartidorAsignado: choferLogueado.nombre,
                                        repartidorDni: choferLogueado.dni
                                    });
                                } else {
                                    throw "¡Demasiado tarde! Otro repartidor ya aceptó este viaje.";
                                }
                            });

                            comenzarTransmisionGPS(viaje.id);

                        } catch (error) {
                            alert(error);
                            boton.disabled = false;
                            boton.innerText = "Aceptar Viaje";
                        }
                    });
                    
                    listaDisponiblesUI.appendChild(div);
                });
            });

            // 2. Escuchar la orden activa (Filtrada para el repartidor logueado)
            const qActivo = query(collection(db, "pedidos"), where("estado", "==", "en_camino"), where("repartidorDni", "==", choferLogueado.dni));
            onSnapshot(qActivo, (snapshot) => {
                contenedorActivoUI.innerHTML = "";
                if (snapshot.empty) {
                    detenerTransmisionGPS();
                    contenedorActivoUI.innerHTML = `<p class="text-xs text-slate-400 italic text-center py-2">No tienes viajes asignados actualmente.</p>`;
                    return;
                }
                snapshot.forEach((docSnap) => {
                    const viaje = docSnap.data();
                    
                    const div = document.createElement("div");
                    div.className = "space-y-3";
                    div.innerHTML = `
                        <div class="text-xs text-slate-300 space-y-1 bg-slate-800 p-3 rounded-xl border border-slate-700">
                            <p><strong>🟢 Retiro:</strong> ${viaje.origen}</p>
                            <p><strong>🔴 Destino:</strong> ${viaje.destino}</p>
                            <p><strong>📦 Descripción:</strong> ${viaje.detalles}</p>
                        </div>
                        <button id="btn-entregar" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2.5 rounded-xl transition shadow-md">
                            🏁 Marcar como Entregado
                        </button>
                    `;
                    
                    div.querySelector("#btn-entregar").addEventListener("click", async () => {
                        detenerTransmisionGPS();
                        await updateDoc(doc(db, "pedidos", viaje.id), { estado: "entregado" });
                    });
                    
                    contenedorActivoUI.appendChild(div);
                });
            });
        }

        // CONTROL DE TRANSMISIÓN GPS OPTIMIZADO (5 SEGUNDOS)
        function comenzarTransmisionGPS(pedidoId) {
            if (!navigator.geolocation) return;
            const pedidoRef = doc(db, "pedidos", pedidoId);
            let ultimaActualizacion = 0;

            geoWatchId = navigator.geolocation.watchPosition(async (position) => {
                const ahora = Date.now();
                // 💰 CONTROL DE CUOTAS FIRESTORE: Solo escribe si pasaron más de 5000ms (5 segundos)
                if (ahora - ultimaActualizacion > 5000) {
                    ultimaActualizacion = ahora;
                    await updateDoc(pedidoRef, {
                        ubicacionRepartidor: {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        }
                    });
                }
            }, (error) => {
                console.error("Error al obtener posición de geolocalización: ", error);
            }, { enableHighAccuracy: true });
        }

        function detenerTransmisionGPS() {
            if (geoWatchId) {
                navigator.geolocation.clearWatch(geoWatchId);
                geoWatchId = null;
            }
        }
    </script>
</body>
</html>
