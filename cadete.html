<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voy! - Panel de Cadetes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col items-center justify-start p-4 pt-8">

    <!-- CABECERA CONTROL PANEL -->
    <div class="w-full max-w-sm mb-6 flex items-center justify-between border-b border-slate-800 pb-4">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🏍️</span>
            <div>
                <h1 class="text-white font-black tracking-tight text-xl">Voy! Drivers</h1>
                <p class="text-emerald-400 text-xs font-bold flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span> En línea trabajando
                </p>
            </div>
        </div>
    </div>

    <!-- CONTENEDOR PRINCIPAL CADETE -->
    <div class="w-full max-w-sm space-y-6">
        
        <!-- SECCIÓN A: TU VIAJE ACTIVO ACTUAL -->
        <div class="bg-indigo-950 p-5 rounded-2xl shadow-xl border border-indigo-900 text-left text-white space-y-4">
            <h2 class="text-sm font-black tracking-widest text-indigo-400 uppercase flex items-center gap-2">
                📌 Mi Viaje Activo
            </h2>
            <div id="viaje-activo-contenedor">
                <p class="text-xs text-indigo-300 italic text-center py-4">No tenés ningún viaje asignado en este momento.</p>
            </div>
        </div>

        <!-- SECCIÓN B: CARTERA DE PEDIDOS DISPONIBLES -->
        <div class="bg-white p-5 rounded-2xl shadow-xl text-left space-y-4">
            <h2 class="text-sm font-black tracking-widest text-gray-500 uppercase flex items-center gap-2">
                📥 Pedidos en la Zona
            </h2>
            <div id="lista-disponibles" class="space-y-3 max-h-96 overflow-y-auto pr-1">
                <p class="text-xs text-gray-400 italic text-center py-6">Buscando solicitudes en tiempo real...</p>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjHsaiCJRWkbdswZzNk6IcqxlkXx20n9o",
            authDomain: "voy-259ba.firebaseapp.com",
            projectId: "voy-259ba",
            storageBucket: "voy-259ba.firebasestorage.app",
            messagingSenderId: "135425806109",
            appId: "1:135425806109:web:09cd26519b0b256b5c1bf4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const listaDisponiblesUI = document.getElementById("lista-disponibles");
        const contenedorActivoUI = document.getElementById("viaje-activo-contenedor");

        // Escucha 1: Pedidos con estado 'buscando_cadete'
        const qDisponibles = query(collection(db, "pedidos"), where("estado", "==", "buscando_cadete"), orderBy("fechaPedido", "desc"));
        onSnapshot(qDisponibles, (snapshot) => {
            listaDisponiblesUI.innerHTML = "";
            if (snapshot.empty) {
                listaDisponiblesUI.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-6">No hay solicitudes pendientes en este momento.</p>`;
                return;
            }
            snapshot.forEach((docSnap) => {
                const viaje = docSnap.data();
                const card = document.createElement("div");
                card.className = "bg-gray-50 border border-gray-200 p-4 rounded-xl space-y-3";
                card.innerHTML = `
                    <div class="text-xs space-y-1 text-gray-600">
                        <p><strong>📦 Paquete:</strong> ${viaje.detalles}</p>
                        <p><strong>🟢 Origen:</strong> ${viaje.origen}</p>
                        <p><strong>🔴 Destino:</strong> ${viaje.destino}</p>
                        <p class="text-sm font-black text-indigo-600 mt-2">Gana: ${viaje.precioEstimado} [${viaje.metodoPago.toUpperCase()}]</p>
                    </div>
                    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 rounded-lg transition btn-tomar" data-id="${viaje.id}">
                        Aceptar Viaje
                    </button>
                `;
                card.querySelector(".btn-tomar").addEventListener("click", async () => {
                    await updateDoc(doc(db, "pedidos", viaje.id), { estado: "en_camino" });
                });
                listaDisponiblesUI.appendChild(card);
            });
        });

        // Escucha 2: Pedidos que pasaron a 'en_camino'
        const qActivo = query(collection(db, "pedidos"), where("estado", "==", "en_camino"));
        onSnapshot(qActivo, (snapshot) => {
            contenedorActivoUI.innerHTML = "";
            if (snapshot.empty) {
                contenedorActivoUI.innerHTML = `<p class="text-xs text-indigo-300 italic text-center py-4">No tenés ningún viaje asignado en este momento.</p>`;
                return;
            }
            snapshot.forEach((docSnap) => {
                const viaje = docSnap.data();
                const cardActiva = document.createElement("div");
                cardActiva.className = "bg-indigo-900/40 border border-indigo-800 p-4 rounded-xl space-y-3 text-xs";
                cardActiva.innerHTML = `
                    <div class="space-y-1 text-indigo-100">
                        <p><strong>📦 Llevar:</strong> ${viaje.detalles}</p>
                        <p><strong> 🧭 Retiro:</strong> ${viaje.origen}</p>
                        <p><strong>📍 Entrega:</strong> ${viaje.destino}</p>
                        <p class="text-sm font-black text-yellow-400 mt-2">Monto a Cobrar: ${viaje.precioEstimado}</p>
                    </div>
                    <button class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition text-xs btn-entregar">
                        ✅ Marcar como Entregado
                    </button>
                `;
                cardActiva.querySelector(".btn-entregar").addEventListener("click", async () => {
                    await updateDoc(doc(db, "pedidos", viaje.id), { estado: "entregado" });
                });
                contenedorActivoUI.appendChild(cardActiva);
            });
        });
    </script>
</body>
</html>
